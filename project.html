<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- match your index.html viewport so the header CSS works identically -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Project Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <a href="index.html" class="logo-link">
      <!-- add the .logo class so it gets sized to 50px high -->
      <img
        src="https://badcopyinc.github.io/Project-Management/Final-M3T-Logo-White.png"
        alt="M3T Logo"
        class="logo"
      />
    </a>
    <h1 class="title">Project Dashboard</h1>
  </header>

  <main>
  <div id="project-container">
    <h2 id="project-name"></h2>
    <div class="progress-bar-bg">
      <div class="progress-fill" id="progress-bar">0%</div>
    </div>

    <!-- Collapsible: Tasks -->
    <div class="collapsible-section">
      <div class="collapsible-header" onclick="toggleSection('tasks-section')">Tasks</div>
      <div class="collapsible-content" id="tasks-section">
        <ul id="task-list"></ul>
        <button class="add-task-btn" onclick="addTask()">+ Add Task</button>
      </div>
    </div>

    <!-- Collapsible: Materials -->
    <div class="collapsible-section">
      <div class="collapsible-header" onclick="toggleSection('materials-section')">Materials</div>
      <div class="collapsible-content" id="materials-section">
        <ul id="material-list"></ul>
        <button class="add-task-btn" onclick="addMaterial()">+ Add Material</button>
      </div>
    </div>

    <!-- Collapsible: Scope of Work -->
    <div class="collapsible-section">
      <div class="collapsible-header" onclick="toggleSection('scope-section')">Scope of Work</div>
      <div class="collapsible-content" id="scope-section">
        <div id="scope-text" class="scrollable-scope"></div>
      </div>
    </div>
  </div>
</main>

  <script src="project.js"></script>
</body>
</html>
