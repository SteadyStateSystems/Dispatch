
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>M3T Technician Dashboard</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <header>
    <a href="index.html" class="logo-link">
      <img src="Final-M3T-Logo-White.png" alt="M3T Logo" class="logo"/>
    </a>
    <h1 class="title">M3T Technician Dashboard</h1>
  </header>

  <main>
    <div id="dashboardControls"></div>
    <div id="technicianContainer"></div>
  </main>


  <!-- Fullscreen Add Project Overlay -->
  <div id="addProjectOverlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:#f5f5f5; z-index:9999; overflow:auto; padding:2rem;">
    <div style="max-width:600px; margin:auto; background:white; padding:2rem; border-radius:1rem; box-shadow:0 0 10px rgba(0,0,0,0.2)">
      <h2>Add New Project</h2>
      <form id="addProjectForm" onsubmit="return false;" action="javascript:void(0);" method="post">
        <label>Technician:
          <select name="technician" id="technicianSelect" required>
            <option value="">Select...</option>
          </select>
        </label><br><br>
        <label>Project Name:<br>
          <input type="text" name="projectName" required>
        </label><br><br>
        <label>Project Address:<br>
          <input type="text" name="address" required>
        </label><br><br>
        <label>Location (site/area):<br>
          <input type="text" name="location" placeholder="e.g., Basement MDF / Floor 2 IDF">
        </label><br><br>
        <label>Site Contact Name:<br>
          <input type="text" name="siteContactName" placeholder="Contact name">
        </label><br><br>
        <label>Site Contact Phone:<br>
          <input type="text" name="siteContactPhone" placeholder="(555) 555-5555">
        </label><br><br>
        <label>Site Contact Email:<br>
          <input type="email" name="siteContactEmail" placeholder="name@example.com">
        </label><br><br>
        <label>Preferred Contact Method:
          <select name="preferredContactMethod">
            <option value="">Not Set</option>
            <option value="phone">Phone</option>
            <option value="text">Text</option>
            <option value="email">Email</option>
          </select>
        </label><br><br>
        <label>Access Instructions:<br>
          <input type="text" name="accessInstructions" placeholder="Gate code, parking, entry notes">
        </label><br><br>
        <label>Warranty/Contract Flag:
          <input type="text" name="warrantyFlag" placeholder="e.g., Warranty Active">
        </label><br><br>
        <label>ETA Window Start:<br>
          <input type="datetime-local" name="etaWindowStart">
        </label><br><br>
        <label>ETA Window End:<br>
          <input type="datetime-local" name="etaWindowEnd">
        </label><br><br>
        <label>Recurring Schedule:
          <select name="recurrence">
            <option value="">None</option>
            <option value="weekly">Weekly</option>
            <option value="biweekly">Biweekly</option>
            <option value="monthly">Monthly</option>
          </select>
        </label><br><br>
        <label>Budget Amount ($):<br>
          <input type="number" name="budgetAmount" step="0.01" min="0" placeholder="0.00">
        </label><br><br>
        <label>Actual Cost ($):<br>
          <input type="number" name="actualCost" step="0.01" min="0" placeholder="0.00">
        </label><br><br>
        <label>Invoice Status:
          <select name="invoiceStatus">
            <option value="not_invoiced">Not Invoiced</option>
            <option value="invoiced">Invoiced</option>
            <option value="paid">Paid</option>
          </select>
        </label><br><br>
        <label>Scheduled Start:<br>
          <input type="datetime-local" name="scheduledStart">
        </label><br><br>
        <label>Scheduled End:<br>
          <input type="datetime-local" name="scheduledEnd">
        </label><br><br>
        <label>Priority:
          <select name="priority">
            <option value="normal">Normal</option>
            <option value="urgent">Urgent</option>
            <option value="emergency">Emergency</option>
          </select>
        </label><br><br>
        <label>Status:
          <select name="status">
            <option value="scheduled">Scheduled</option>
            <option value="en_route">En Route</option>
            <option value="on_site">On Site</option>
            <option value="complete">Complete</option>
          </select>
        </label><br><br>
        <label>Template (optional):
          <select name="templateId" id="templateSelect"><option value="">None</option></select>
        </label><br><br>
        <label>Tasks (one per line):<br>
          <textarea name="tasks" rows="4"></textarea>
        </label><br><br>
        <label>Materials (one per line):<br>
          <textarea name="materials" rows="4"></textarea>
        </label><br><br>
        <label>Scope of Work:<br>
          <textarea name="scope" rows="5"></textarea>
        </label><br><br>
        <button type="button" id="addProjectSubmitBtn">Submit</button>
        <button type="button" onclick="document.getElementById('addProjectOverlay').style.display='none'">Cancel</button>
        <div id="addProjectDebug" style="margin-top:0.75rem;color:#333;font-size:0.9rem;"></div>
      </form>
    </div>
  </div>

  <div id="dispatchOverlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:#f5f5f5; z-index:9998; overflow:auto; padding:2rem;">
    <div style="max-width:900px; margin:auto; background:white; padding:2rem; border-radius:1rem; box-shadow:0 0 10px rgba(0,0,0,0.2)">
      <h2>Dispatch Board</h2>
      <p style="margin-top:0;color:#555;">Quick actions: move earlier/later, priority bump, ETA presets, and recurrence trigger.</p>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin:0.5rem 0 0.8rem;">
        <select id="dispatchTechFilter"><option value="">All Techs</option></select>
        <select id="dispatchStatusFilter">
          <option value="">All Statuses</option>
          <option value="scheduled">scheduled</option>
          <option value="in_progress">in_progress</option>
          <option value="delayed">delayed</option>
          <option value="done">done</option>
        </select>
      </div>
      <ul id="dispatchBoardList" style="display:flex;flex-direction:column;gap:0.5rem;padding-left:1rem;"></ul>
      <button type="button" id="dispatchRefreshBtn">Refresh Board</button>
      <button type="button" id="dispatchPreviewRecurrenceBtn">Preview Recurrence</button>
      <button type="button" id="dispatchRunRecurrenceBtn">Run Recurring Scheduler</button>
      <button type="button" onclick="document.getElementById('dispatchOverlay').style.display='none'">Close</button>
    </div>
  </div>

  <div id="financeOverlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:#f5f5f5; z-index:9998; overflow:auto; padding:2rem;">
    <div style="max-width:980px; margin:auto; background:white; padding:2rem; border-radius:1rem; box-shadow:0 0 10px rgba(0,0,0,0.2)">
      <h2>Finance Board</h2>
      <div style="display:flex; gap:0.5rem; margin-bottom:0.6rem; flex-wrap:wrap;">
        <select id="financeStatusFilter">
          <option value="">All Statuses</option>
          <option value="not_invoiced">Not Invoiced</option>
          <option value="invoiced">Invoiced</option>
          <option value="paid">Paid</option>
        </select>
        <label style="display:flex;align-items:center;gap:0.25rem;font-size:0.9rem;">
          <input type="checkbox" id="financeOverdueOnly" /> Overdue invoiced only (14d+)
        </label>
        <button type="button" id="financeRefreshBtn">Refresh</button>
        <button type="button" id="financeBulkInvoicedBtn">Mark Filtered Invoiced</button>
        <button type="button" id="financeBulkPaidBtn">Mark Filtered Paid</button>
        <button type="button" id="financeExportBtn">Export CSV</button>
      </div>
      <div id="financeSummaryLine" style="margin-bottom:0.35rem; color:#333;"></div>
      <div id="financeAlertsLine" style="margin-bottom:0.6rem; color:#8b1e1e; font-weight:700;"></div>
      <ul id="financeBoardList" style="display:flex; flex-direction:column; gap:0.4rem; padding-left:1rem;"></ul>
      <button type="button" onclick="document.getElementById('financeOverlay').style.display='none'">Close</button>
    </div>
  </div>

  <div id="adminTechOverlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:#f5f5f5; z-index:9998; overflow:auto; padding:2rem;">
    <div style="max-width:700px; margin:auto; background:white; padding:2rem; border-radius:1rem; box-shadow:0 0 10px rgba(0,0,0,0.2)">
      <h2>Technician Management</h2>
      <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem;">
        <input id="adminTechName" placeholder="Tech name" />
        <select id="adminTechRole">
          <option value="technician">Technician</option>
          <option value="project_manager">Project Manager</option>
          <option value="system_admin">System Admin</option>
        </select>
        <button type="button" id="adminTechAddBtn">Add / Update</button>
      </div>
      <ul id="adminTechList"></ul>
      <hr/>
      <h3>Feature Toggles</h3>
      <label><input type="checkbox" id="toggleRequiredPhotos" /> Enforce required closeout photos (before/after)</label>
      <button type="button" id="saveFeatureTogglesBtn">Save Toggles</button>
      <button type="button" onclick="document.getElementById('adminTechOverlay').style.display='none'">Close</button>
      <div id="adminTechDebug" style="margin-top:0.75rem;color:#333;font-size:0.9rem;"></div>
    </div>
  </div>

  <script src="main.js?v=20260304-1036"></script>
  <script src="pwa.js?v=20260304-1036"></script>

  <script>
    const FORM_API_BASE = window.M3T_API_BASE || 'https://adjusted-bluejay-gratefully.ngrok-free.app';

    async function loadTemplates() {
      try {
        const res = await fetch(`${FORM_API_BASE}/templates`, { headers: { 'ngrok-skip-browser-warning': 'true' } });
        if (!res.ok) return;
        const payload = await res.json();
        const sel = document.getElementById('templateSelect');
        sel.innerHTML = '<option value="">None</option>';
        (payload.templates || []).forEach(t => {
          const opt = document.createElement('option');
          opt.value = t.id;
          opt.textContent = t.name;
          sel.appendChild(opt);
        });
      } catch {}
    }

    async function loadTechs() {
      try {
        const res = await fetch(`${FORM_API_BASE}/techs`, { headers: { 'ngrok-skip-browser-warning': 'true' } });
        if (!res.ok) return;
        const payload = await res.json();
        const techs = (payload.techs || []).filter(t => t.active !== false);

        const sel = document.getElementById('technicianSelect');
        if (sel) {
          const current = sel.value;
          sel.innerHTML = '<option value="">Select...</option>';
          techs.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t.name;
            opt.textContent = t.name;
            sel.appendChild(opt);
          });
          if (current) sel.value = current;
        }

        const list = document.getElementById('adminTechList');
        if (list) {
          list.innerHTML = '';
          techs.forEach(t => {
            const li = document.createElement('li');
            li.style.marginBottom = '0.4rem';
            li.innerHTML = `<strong>${t.name}</strong> (${t.role || 'technician'}) <button data-remove="${t.name}">Remove</button>`;
            list.appendChild(li);
          });

          list.querySelectorAll('button[data-remove]').forEach(btn => {
            btn.addEventListener('click', async () => {
              const name = btn.getAttribute('data-remove');
              const role = (document.getElementById('roleMode')?.value || localStorage.getItem('m3t-role') || 'tech').toLowerCase();
              if (!['admin','system_admin','project_manager'].includes(role)) return alert('Admin only');
              const r = await fetch(`${FORM_API_BASE}/admin/techs/remove`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'ngrok-skip-browser-warning': 'true',
                  'x-m3t-role': role
                },
                body: JSON.stringify({ name, updatedBy: 'Admin', role })
              });
              const p = await r.json().catch(()=>({}));
              const dbg = document.getElementById('adminTechDebug');
              if (dbg) dbg.textContent = r.ok ? `Removed: ${name}` : `Failed remove: ${p.error || r.status}`;
              if (r.ok) await loadTechs();
            });
          });
        }
      } catch {}
    }

    async function loadFeatureToggles() {
      const role = (document.getElementById('roleMode')?.value || localStorage.getItem('m3t-role') || 'tech').toLowerCase();
      if (!['admin','system_admin'].includes(role)) return;
      try {
        const res = await fetch(`${FORM_API_BASE}/admin/feature-toggles`, {
          headers: {
            'ngrok-skip-browser-warning': 'true',
            'x-m3t-role': role
          }
        });
        const p = await res.json().catch(()=>({}));
        const chk = document.getElementById('toggleRequiredPhotos');
        if (chk) chk.checked = !!p.featureToggles?.requiredPhotoEnforcement;
      } catch {}
    }

    async function saveFeatureToggles() {
      const role = (document.getElementById('roleMode')?.value || localStorage.getItem('m3t-role') || 'tech').toLowerCase();
      if (!['admin','system_admin'].includes(role)) return alert('System Admin only');
      const requiredPhotoEnforcement = !!document.getElementById('toggleRequiredPhotos')?.checked;
      const res = await fetch(`${FORM_API_BASE}/admin/feature-toggles`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'ngrok-skip-browser-warning': 'true',
          'x-m3t-role': role
        },
        body: JSON.stringify({ requiredPhotoEnforcement, updatedBy: 'System Admin' })
      });
      const p = await res.json().catch(()=>({}));
      const dbg = document.getElementById('adminTechDebug');
      if (dbg) dbg.textContent = res.ok ? 'Feature toggles saved' : `Failed toggle save: ${p.error || res.status}`;
    }

    async function adminUpsertTech() {
      const role = (document.getElementById('roleMode')?.value || localStorage.getItem('m3t-role') || 'tech').toLowerCase();
      if (!['admin','system_admin'].includes(role)) return alert('System Admin only');
      const name = document.getElementById('adminTechName').value.trim();
      const techRole = document.getElementById('adminTechRole').value;
      if (!name) return alert('Tech name required');
      const res = await fetch(`${FORM_API_BASE}/admin/techs`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'ngrok-skip-browser-warning': 'true',
          'x-m3t-role': role
        },
        body: JSON.stringify({ name, role: techRole, active: true, updatedBy: 'System Admin' })
      });
      const payload = await res.json().catch(()=>({}));
      const dbg = document.getElementById('adminTechDebug');
      if (dbg) dbg.textContent = res.ok ? `Saved: ${name}` : `Failed: ${payload.error || res.status}`;
      if (res.ok) {
        document.getElementById('adminTechName').value = '';
        await loadTechs();
      }
    }

    const adminBtn = document.getElementById('adminTechAddBtn');
    if (adminBtn) adminBtn.addEventListener('click', adminUpsertTech);
    const toggleBtn = document.getElementById('saveFeatureTogglesBtn');
    if (toggleBtn) toggleBtn.addEventListener('click', saveFeatureToggles);

    loadTemplates();
    loadTechs();
    loadFeatureToggles();

    const addProjectForm = document.getElementById('addProjectForm');
    addProjectForm.setAttribute('novalidate', 'novalidate');

    async function submitAddProject(e) {
      if (e?.preventDefault) e.preventDefault();
      const form = addProjectForm;
      const debugEl = document.getElementById('addProjectDebug');

      const requiredChecks = [
        { key: 'technician', label: 'Technician' },
        { key: 'projectName', label: 'Project Name' },
        { key: 'address', label: 'Project Address' }
      ];
      const missing = requiredChecks.filter(f => !(form[f.key]?.value || '').trim());
      if (missing.length) {
        if (debugEl) debugEl.textContent = `❌ Missing: ${missing.map(m => m.label).join(', ')}`;
        alert(`Please complete: ${missing.map(m => m.label).join(', ')}`);
        return;
      }

      const roleSelectEl = document.getElementById('roleMode');
      const role = (roleSelectEl?.value || localStorage.getItem('m3t-role') || 'tech').toLowerCase();
      if (!['admin','system_admin','project_manager'].includes(role)) {
        if (debugEl) debugEl.textContent = `❌ Blocked: role is ${role}. Switch Role to Admin.`;
        alert('Admin role required to add projects.');
        return;
      }

      const technician = form.technician.value;
      const name = form.projectName.value;
      const address = form.address.value;
      const location = form.location.value;
      const siteContactName = form.siteContactName.value;
      const siteContactPhone = form.siteContactPhone.value;
      const siteContactEmail = form.siteContactEmail.value;
      const preferredContactMethod = form.preferredContactMethod.value || '';
      const accessInstructions = form.accessInstructions.value || '';
      const warrantyFlag = form.warrantyFlag.value || '';
      const etaWindowStart = form.etaWindowStart.value ? new Date(form.etaWindowStart.value).toISOString() : null;
      const etaWindowEnd = form.etaWindowEnd.value ? new Date(form.etaWindowEnd.value).toISOString() : null;
      const recurrence = form.recurrence.value || null;
      const budgetAmount = Number(form.budgetAmount.value || 0);
      const actualCost = Number(form.actualCost.value || 0);
      const invoiceStatus = form.invoiceStatus.value || 'not_invoiced';
      const scheduledStart = form.scheduledStart.value ? new Date(form.scheduledStart.value).toISOString() : null;
      const scheduledEnd = form.scheduledEnd.value ? new Date(form.scheduledEnd.value).toISOString() : null;
      const priority = form.priority.value || 'normal';
      const status = form.status.value || 'scheduled';
      const scope = form.scope.value;
      const templateId = form.templateId.value || '';
      const tasks = form.tasks.value.split('\n').filter(Boolean).map(t => ({ name: t, complete: false }));
      const materials = form.materials.value.split('\n').filter(Boolean).map(m => ({ name: m, stage: 0 }));

      if (debugEl) debugEl.textContent = 'Submitting...';

      const requestBody = {
        technician, name, address, location,
        siteContactName, siteContactPhone, siteContactEmail,
        preferredContactMethod, accessInstructions, warrantyFlag,
        etaWindowStart, etaWindowEnd, recurrence,
        budgetAmount, actualCost, invoiceStatus,
        scheduledStart, scheduledEnd, priority, status,
        assignedTech: technician,
        scope, templateId, tasks, materials, updatedBy: 'Admin'
      };
      const response = await fetch(`${FORM_API_BASE}/addProject`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'ngrok-skip-browser-warning': 'true',
          'x-m3t-role': role
        },
        body: JSON.stringify(requestBody)
      });

      const payload = await response.json().catch(() => ({}));
      if (response.ok && payload.success !== false) {
        if (debugEl) debugEl.textContent = `✅ Added: ${technician} / ${name}`;
        alert('Project added successfully');
        document.getElementById('addProjectOverlay').style.display='none';
        const btn = document.getElementById('reloadBtn');
        if (btn) btn.click();
      } else {
        if (debugEl) debugEl.textContent = `❌ Failed (${response.status}): ${payload.error || 'Unknown error'}`;
        alert(payload.error || 'Failed to add project');
      }
    }

    addProjectForm.addEventListener('submit', submitAddProject);
    const submitBtn = document.getElementById('addProjectSubmitBtn');
    if (submitBtn) submitBtn.addEventListener('click', submitAddProject);
  </script>
</body>
</html>
